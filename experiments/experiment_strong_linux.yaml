# experiments/experiment_strong_linux.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Experimento principal — GPU forte Linux (sem root, sem Docker)
#
# SELEÇÃO DE MODELOS — RACIOCÍNIO:
# ═══════════════════════════════════════════════════════════════════════════
#
#   Hardware alvo: GPU Linux com VRAM ≥ 24 GB (ex: RTX 3090/4090, A100, H100)
#
#   Com CUDA disponível e vLLM instalado, a throughput é ~5-10× maior que
#   Ollama para modelos 14B+:
#
#     Modelo                    VRAM (bf16/fp16)  tok/s (vLLM, 24GB)
#     ─────────────────────────────────────────────────────────────────────────
#     qwen2.5-coder-32b         ~20 GB bf16       ~25-50 tok/s  ← PRINCIPAL
#     deepseek-coder-v2-16b     ~10 GB bf16       ~50-80 tok/s
#     qwen2.5-coder-14b         ~9 GB  bf16       ~60-100 tok/s
#     starcoder2-15b            ~10 GB bf16       ~50-80 tok/s
#
#   Com quantização Q4 via Ollama (fallback se vLLM não disponível):
#     qwen2.5-coder:32b         ~20 GB Q4_K_M     ~8-15 tok/s
#     deepseek-coder-v2:16b     ~10 GB Q4_K_M     ~15-25 tok/s
#     qwen2.5-coder:14b         ~9 GB  Q4_K_M     ~20-35 tok/s
#
#   EXCLUÍDOS:
#     Modelos ≤ 7B   — subaproveitam a GPU forte; já cobertos no weak_gpu
#     Modelos ≥ 72B  — requerem GPU ≥ 40 GB (A100/H100); ajuste se disponível
#
# BACKENDS:
#   vLLM  — preferido em Linux/CUDA; ~5-10× mais rápido que Ollama para 14B+
#   Ollama — fallback automático se vLLM não instalado
#   Ambos são compatíveis com o runner; controlado via LLM_BACKEND no .env
#
# EXECUÇÃO (via setup_linux.sh + venv, sem root):
#   ./run_experiment.sh                    # config padrão
#   ./run_experiment.sh --config experiments/experiment_strong_linux.yaml
#   ./run_experiment.sh --output experiment-results/linux_run_1
#
#   Em outro terminal para monitorar:
#   ./watch.sh
#
# Para retomar após interrupção (checkpoints automáticos):
#   ./run_experiment.sh    # detecta checkpoints existentes e retoma
#
# Duração estimada (GPU 24 GB, vLLM, 3 modelos, 35 projetos, 3 repetições):
#   ~4-8 horas total (vs ~24-48h na máquina Windows com GPU fraca)
# ─────────────────────────────────────────────────────────────────────────────

name: "Strong Linux GPU — 14B-32B Code Models A11y Comparison"
description: |
  Experimento comparativo entre modelos open-source de 14B-32B parâmetros
  na tarefa de correção automática de problemas WCAG 2.1 AA em código
  React/TypeScript. Otimizado para GPU Linux ≥ 24 GB VRAM com vLLM
  (ou Ollama como fallback). Mesmo corpus de 35 projetos da máquina Windows
  para comparabilidade dos resultados entre máquinas/backends.

# ── Modelos — ordenados por capacidade esperada ──────────────────────────────
# Via vLLM: usar IDs HuggingFace  (Qwen/Qwen2.5-Coder-32B-Instruct)
# Via Ollama: usar tags do registry (qwen2.5-coder:32b)
# O runner detecta automaticamente o backend configurado em .env (LLM_BACKEND)
models:
  - qwen2.5-coder-32b       # SOTA 32B — Qwen/Qwen2.5-Coder-32B-Instruct
  - deepseek-coder-v2-16b   # DeepSeek-Coder-V2-Lite — família diferente
  - starcoder2-15b          # StarCoder2-15B — BigCode / HuggingFace

# ── Projetos (mesmo corpus da máquina Windows para comparabilidade) ──────────
files:
  # Dashboard (5)
  - dataset/snapshots/AHMAD-JX__Hozn-RealEstate-Fullstack
  - dataset/snapshots/edp963__davinci
  - dataset/snapshots/arpanghosh8453__open-dronelog
  - dataset/snapshots/builderz-labs__mission-control
  - dataset/snapshots/Kanaries__graphic-walker
  # Developer Tools (5)
  - dataset/snapshots/alibaba-fusion__next
  - dataset/snapshots/FeatureProbe__FeatureProbe
  - dataset/snapshots/arco-design__arco-design
  - dataset/snapshots/cloudscape-design__components
  - dataset/snapshots/debba__tabularis
  # E-commerce (5)
  - dataset/snapshots/aelassas__bookcars
  - dataset/snapshots/BuilderIO__mitosis
  - dataset/snapshots/aelassas__movinin
  - dataset/snapshots/CromwellCMS__Cromwell
  - dataset/snapshots/BuilderIO__builder
  # Education (5)
  - dataset/snapshots/LHRUN__paint-board
  - dataset/snapshots/angellikgh__react-design-editor
  - dataset/snapshots/F-star__suika
  - dataset/snapshots/WindRunnerMax__CanvasEditor
  - dataset/snapshots/KartikLabhshetwar__screenshot-studio
  # Government (5)
  - dataset/snapshots/codeforpdx__recordexpungPDX
  - dataset/snapshots/JustFixNYC__who-owns-what
  - dataset/snapshots/demokratie-live__democracy-development
  - dataset/snapshots/codyogden__killedbygoogle
  - dataset/snapshots/cds-snc__gcds-components
  # Healthcare (5)
  - dataset/snapshots/OHIF__Viewers
  - dataset/snapshots/Snouzy__workout-cool
  - dataset/snapshots/beda-software__fhir-emr
  - dataset/snapshots/DouglasNeuroInformatics__OpenDataCapture
  - dataset/snapshots/aphp__Cohort360-FrontEnd
  # Social (5)
  - dataset/snapshots/OvidijusParsiunas__deep-chat
  - dataset/snapshots/agnaistic__agnai
  - dataset/snapshots/dream-num__univer
  - dataset/snapshots/Privoce__vocechat-web
  - dataset/snapshots/Linen-dev__linen.dev

# ── Nível WCAG ────────────────────────────────────────────────────────────────
wcag_level: AA

# ── Scanners ──────────────────────────────────────────────────────────────────
scanners:
  - pa11y
  - axe-core
  - playwright+axe
  - eslint-jsx-a11y

# ── Agente ────────────────────────────────────────────────────────────────────
agents:
  - auto

# ── Estratégia ────────────────────────────────────────────────────────────────
strategy: few-shot

# ── Repetições ────────────────────────────────────────────────────────────────
repetitions: 3

# ── Paralelismo (GPU forte: 1 modelo de cada vez na GPU) ─────────────────────
execution:
  cold_start: true           # reiniciar servidor entre modelos (metodologia §3.1.3)
  max_concurrent_models: 1   # 1 modelo de cada vez (mesmo com VRAM grande, cold-start)
  temperature: 0.1           # baixa para reprodutibilidade

# ── Timeouts (calibrados para GPU ≥ 24 GB + vLLM) ────────────────────────────
# vLLM + 24 GB VRAM: ~25-80 tok/s para modelos 14B-32B
# Arquivo típico de 200 linhas com ~5 issues → ~15-60s de inferência
# Margem conservadora: 5 min por arquivo (vs 10 min na máquina Windows)
scan_timeout_s: 120          # scanner por arquivo
agent_timeout_s: 300         # LLM por arquivo — 5 min (GPU rápida)
model_load_timeout_s: 180    # carregamento do modelo na VRAM (vLLM/Ollama)

# ── Métricas (idênticas ao weak_gpu para comparabilidade) ─────────────────────
metrics:
  - detection_rate
  - correction_rate
  - regression_rate
  - precision
  - tokens_used
  - time_per_file_s
  - issues_by_type
  - issues_by_wcag_principle
  - fix_by_agent

# ── Saídas ────────────────────────────────────────────────────────────────────
output_format:
  - json
  - html
  - csv

output_dir: experiment-results/strong_linux_comparison

# ── Configurações avançadas ───────────────────────────────────────────────────
advanced:
  auto_clone_missing_snapshots: true
  checkpoint_per_project: true
  checkpoint_dir: experiment-results/strong_linux_comparison/checkpoints
  save_diffs: true
  typescript_validation: false
  max_files_per_project: null
  seed: 42
