# experiments/experiment_weak_gpu.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Experimento para GPU com 4 GB VRAM — Windows com venv
#
# SELEÇÃO DE MODELOS — RACIOCÍNIO:
# ═══════════════════════════════════════════════════════════════════════════
#
#   Hardware alvo: 4 GB VRAM + ~16 GB RAM disponível
#
#   Com 4 GB VRAM, o Ollama usa CPU-offload automático:
#   os layers que não cabem na GPU são executados na RAM.
#   Com 16 GB RAM disponível isso é viável para modelos até 7B.
#
#   Modelo                VRAM (Q4_K_M)  Comportamento na 4GB GPU
#   ──────────────────────────────────────────────────────────────────────────
#   qwen2.5-coder-3b      ~2.0 GB        100% GPU  → rápido (~5-10 tok/s)
#   qwen2.5-coder-7b      ~4.1 GB        ~3.5GB GPU + ~0.6GB RAM → médio (~3-6 tok/s)
#   codellama-7b          ~4.1 GB        ~3.5GB GPU + ~0.6GB RAM → médio (~3-6 tok/s)
#
#   EXCLUÍDOS:
#     qwen2.5-coder-14b   ~8.9 GB  → >50% na CPU, muito lento para experimento
#     modelos vLLM                 → vLLM não suporta Windows nativamente
#
# EXECUÇÃO (via venv no Windows):
#   .\run_experiment.ps1                    # roda com configuração padrão
#   .\run_experiment.ps1 -Output meu_run1   # diretório de saída customizado
#
#   Em outro terminal para monitorar:
#   .\watch.ps1
#
# Para retomar após interrupção (checkpoints automáticos):
#   .\run_experiment.ps1    # detecta checkpoints existentes e retoma
# ─────────────────────────────────────────────────────────────────────────────

name: "7B Code Models — A11y Auto-fix (GPU Fraca / Windows)"
description: |
  Experimento comparativo entre modelos open-source de 3–7B parâmetros
  na tarefa de correção automática de problemas WCAG 2.1 AA em código
  React/TypeScript. Configurado para GPUs com ≤8 GB VRAM rodando Windows.
  Cobre 35 projetos reais do corpus distribuídos pelos 7 domínios de aplicação.

# ── Modelos (todos via ollama, Windows-compatíveis, ≤5 GB VRAM) ──────────────
models:
  - qwen2.5-coder-7b   # SOTA 7B coding — 4.1 GB Q4_K_M  (Alibaba/Qwen)
  - codellama-7b       # Meta/CodeLlama  — 4.1 GB Q4_K_M  (família diferente)
  - qwen2.5-coder-3b   # baseline leve   — 2.0 GB Q4_K_M  (referência)

# ── Projetos (mesmos 35 do experimento principal) ────────────────────────────
files:
  # Dashboard (5)
  - dataset/snapshots/AHMAD-JX__Hozn-RealEstate-Fullstack
  - dataset/snapshots/edp963__davinci
  - dataset/snapshots/arpanghosh8453__open-dronelog
  - dataset/snapshots/builderz-labs__mission-control
  - dataset/snapshots/Kanaries__graphic-walker
  # Developer Tools (5)
  - dataset/snapshots/alibaba-fusion__next
  - dataset/snapshots/FeatureProbe__FeatureProbe
  - dataset/snapshots/arco-design__arco-design
  - dataset/snapshots/cloudscape-design__components
  - dataset/snapshots/debba__tabularis
  # E-commerce (5)
  - dataset/snapshots/aelassas__bookcars
  - dataset/snapshots/BuilderIO__mitosis
  - dataset/snapshots/aelassas__movinin
  - dataset/snapshots/CromwellCMS__Cromwell
  - dataset/snapshots/BuilderIO__builder
  # Education (5)
  - dataset/snapshots/LHRUN__paint-board
  - dataset/snapshots/angellikgh__react-design-editor
  - dataset/snapshots/F-star__suika
  - dataset/snapshots/WindRunnerMax__CanvasEditor
  - dataset/snapshots/KartikLabhshetwar__screenshot-studio
  # Government (5)
  - dataset/snapshots/codeforpdx__recordexpungPDX
  - dataset/snapshots/JustFixNYC__who-owns-what
  - dataset/snapshots/demokratie-live__democracy-development
  - dataset/snapshots/codyogden__killedbygoogle
  - dataset/snapshots/cds-snc__gcds-components
  # Healthcare (5)
  - dataset/snapshots/OHIF__Viewers
  - dataset/snapshots/Snouzy__workout-cool
  - dataset/snapshots/beda-software__fhir-emr
  - dataset/snapshots/DouglasNeuroInformatics__OpenDataCapture
  - dataset/snapshots/aphp__Cohort360-FrontEnd
  # Social (5)
  - dataset/snapshots/OvidijusParsiunas__deep-chat
  - dataset/snapshots/agnaistic__agnai
  - dataset/snapshots/dream-num__univer
  - dataset/snapshots/Privoce__vocechat-web
  - dataset/snapshots/Linen-dev__linen.dev

# ── Nível WCAG ────────────────────────────────────────────────────────────────
wcag_level: AA

# ── Scanners ──────────────────────────────────────────────────────────────────
scanners:
  - pa11y
  - axe-core
  - playwright+axe
  - eslint-jsx-a11y

# ── Agente ────────────────────────────────────────────────────────────────────
agents:
  - auto

# ── Estratégia ────────────────────────────────────────────────────────────────
strategy: few-shot

# ── Repetições ────────────────────────────────────────────────────────────────
repetitions: 3

# ── Paralelismo (GPU fraca: 1 modelo de cada vez, 1 arquivo por vez) ─────────
execution:
  cold_start: true           # reiniciar servidor entre modelos
  max_concurrent_models: 1   # 1 modelo de cada vez (sem VRAM para mais)
  temperature: 0.1

# ── Timeouts (calibrados para 4 GB VRAM + CPU offload) ───────────────────────
# 4 GB VRAM com modelo 7B Q4: ~3-6 tok/s (parte na GPU, parte na CPU/RAM)
# Arquivo típico de 200 linhas com ~5 issues → ~60-180s de inferência
# Margem: 10 min por arquivo para cobrir projetos com muitas issues
scan_timeout_s: 120          # scanner por arquivo
agent_timeout_s: 600         # LLM por arquivo — 10 min (CPU offload é lento)
model_load_timeout_s: 300    # carregamento do modelo — 5 min (offload demora mais)

# ── Métricas (iguais ao experimento principal para comparabilidade) ────────────
metrics:
  - detection_rate
  - correction_rate
  - regression_rate
  - precision
  - tokens_used
  - time_per_file_s
  - issues_by_type
  - issues_by_wcag_principle
  - fix_by_agent

# ── Saídas ────────────────────────────────────────────────────────────────────
output_format:
  - json
  - html
  - csv

output_dir: experiment-results/weak_gpu_comparison

# ── Configurações avançadas ───────────────────────────────────────────────────
advanced:
  auto_clone_missing_snapshots: true
  checkpoint_per_project: true
  checkpoint_dir: experiment-results/weak_gpu_comparison/checkpoints
  save_diffs: true
  typescript_validation: false

  # ── Amostragem ──────────────────────────────────────────────────────────────
  # Limita a 60 arquivos por projeto (amostragem determinística, seed=42).
  # Com 35 projetos: máx 2.100 arquivos vs 22.000+ sem limite.
  # Justificativa: libs com 1.000+ componentes têm cobertura suficiente em 60 arquivos.
  # Para remover o limite: max_files_per_project: null
  max_files_per_project: 60
  seed: 42

  # Amostragem estratificada por tipo de issue (recomendado: true).
  #
  # Quando true: os 60 slots por projeto são distribuídos proporcionalmente
  # entre os estratos de tipo de issue (keyboard, aria, semantic, alt-text, etc.)
  # presentes em dataset/results/{project_id}/findings.jsonl, garantindo que
  # a composição do corpus amostrado reflita a distribuição real do projeto.
  #
  # Quando false (padrão anterior): shuffle aleatório + take N — pode resultar
  # em viés de composição (ex: 99% ARIA em vez de ~15% esperado), comprometendo
  # a validade externa dos resultados por critério WCAG.
  #
  # Impacto no runtime: leve overhead de leitura de findings.jsonl por projeto
  # (~100ms total) — sem impacto mensurável na duração do experimento.
  #
  # Requer: dataset/results/{project_id}/findings.jsonl pré-computados.
  # Se ausentes, o comportamento cai automaticamente para shuffle aleatório.
  stratified_sampling: true
