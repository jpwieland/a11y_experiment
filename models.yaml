# models.yaml — Registro de modelos LLM para experimentação
# Edite este arquivo para adicionar/remover modelos sem modificar código.

models:
  # ═══ Qwen Family ═══
  qwen2.5-coder-3b:
    backend: ollama
    model_id: "qwen2.5-coder:3b"
    family: qwen
    size: 3b
    temperature: 0.1
    max_tokens: 4096
    tags: [coding, instruct, multilingual, low-vram]
    # VRAM: ~2 GB (Q4_K_M) -- cabe em 4 GB VRAM

  qwen2.5-coder-7b:
    backend: ollama
    model_id: "qwen2.5-coder:7b"
    family: qwen
    size: 7b
    temperature: 0.1
    max_tokens: 8192
    tags: [coding, instruct, multilingual]
    # VRAM: ~4.1 GB (Q4_K_M) -- partial offload em 4 GB VRAM

  qwen2.5-coder-14b:
    backend: ollama
    model_id: "qwen2.5-coder:14b"
    family: qwen
    size: 14b
    temperature: 0.1
    max_tokens: 8192
    tags: [coding, instruct, multilingual]
    # VRAM: ~8.9 GB (Q4_K_M) -- requer >=8 GB VRAM; roda na CPU em 4 GB (muito lento)

  qwen2.5-coder-32b:
    backend: vllm
    base_url: "http://localhost:8000/v1"
    model_id: "Qwen/Qwen2.5-Coder-32B-Instruct"
    family: qwen
    size: 32b
    temperature: 0.1
    max_tokens: 16384
    tags: [coding, instruct, multilingual, large]
    # VRAM: ~65 GB BF16 | ~33 GB FP8 | ~18 GB Q4_K_M
    # 128 GB VRAM: BF16 confortável; roda com max_num_seqs=8

  qwen2.5-coder-72b:
    backend: vllm
    base_url: "http://localhost:8000/v1"
    model_id: "Qwen/Qwen2.5-Coder-7B-Instruct"   # substituir pelo 72B após pull
    family: qwen
    size: 72b
    temperature: 0.1
    max_tokens: 32768
    tags: [coding, instruct, multilingual, sota, large]
    # VRAM: ~144 GB BF16 → não cabe; ~72 GB FP8 → cabe em 128 GB VRAM
    # Comando de serve: vllm serve Qwen/Qwen2.5-Coder-7B-Instruct \
    #   --quantization fp8 --gpu-memory-utilization 0.92 --max-model-len 32768

  # ═══ DeepSeek Family ═══
  deepseek-coder-v2-16b:
    backend: ollama
    model_id: "deepseek-coder-v2:16b"
    family: deepseek
    size: 16b
    temperature: 0.1
    max_tokens: 8192
    tags: [coding, instruct, fill-in-middle]

  deepseek-coder-v2-236b:
    backend: vllm
    base_url: "http://localhost:8000/v1"
    model_id: "deepseek-ai/DeepSeek-Coder-V2-Instruct"
    family: deepseek
    size: 236b
    temperature: 0.1
    max_tokens: 16384
    tags: [coding, instruct, sota, large]
    # VRAM: ~470 GB BF16 → NÃO CABE em 128 GB.
    # Usar deepseek-coder-v2-16b (variante lite) como substituto prático.

  deepseek-coder-v2-lite:
    backend: vllm
    base_url: "http://localhost:8000/v1"
    model_id: "deepseek-ai/DeepSeek-Coder-V2-Lite-Instruct"
    family: deepseek
    size: 16b
    temperature: 0.1
    max_tokens: 16384
    tags: [coding, instruct, fill-in-middle]
    # VRAM: ~32 GB BF16 — cabe fácil em 128 GB VRAM

  # ═══ CodeLlama Family ═══
  codellama-7b:
    backend: ollama
    model_id: "codellama:7b-instruct"
    family: codellama
    size: 7b
    temperature: 0.2
    max_tokens: 4096
    tags: [coding, instruct]
    # VRAM: ~4.1 GB (Q4_K_M) -- partial offload em 4 GB VRAM

  codellama-13b:
    backend: lm_studio
    model_id: "TheBloke/CodeLlama-13B-Instruct-GGUF"
    family: codellama
    size: 13b
    temperature: 0.2
    max_tokens: 4096
    tags: [coding, instruct]

  codellama-34b:
    backend: vllm
    base_url: "http://localhost:8001/v1"
    model_id: "codellama/CodeLlama-34b-Instruct-hf"
    family: codellama
    size: 34b
    temperature: 0.2
    max_tokens: 8192
    tags: [coding, instruct, large]

  # ═══ Llama ═══
  llama3.1-8b:
    backend: ollama
    model_id: "llama3.1:8b-instruct-q4_K_M"
    family: llama
    size: 8b
    quantization: q4_k_m
    temperature: 0.1
    max_tokens: 8192
    tags: [general, instruct]

  # ═══ Mistral / Codestral ═══
  codestral-22b:
    backend: lm_studio
    model_id: "mistral-ai/Codestral-22B-v0.1"
    family: mistral
    size: 22b
    temperature: 0.1
    max_tokens: 8192
    tags: [coding, instruct, fill-in-middle]

  # ═══ StarCoder2 ═══
  starcoder2-15b:
    backend: ollama
    model_id: "starcoder2:15b"
    family: starcoder
    size: 15b
    temperature: 0.1
    max_tokens: 8192
    tags: [coding, fill-in-middle, open-science]
    # VRAM: ~9 GB (Q4_K_M) -- cabe em RTX 4090 (24 GB VRAM)
    # Treinado por BigCode (HuggingFace + ServiceNow + Nvidia)
    # 600+ linguagens, 4T tokens de código

# Grupos de modelos para experimentos comparativos
model_groups:
  small_models:
    - qwen2.5-coder-3b
    - qwen2.5-coder-7b
    - codellama-7b
    - llama3.1-8b

  medium_models:
    - qwen2.5-coder-14b
    - deepseek-coder-v2-16b
    - codellama-13b

  large_models:
    - qwen2.5-coder-32b
    - deepseek-coder-v2-lite
    - codellama-34b

  # Grupo ideal para GPU com 128 GB VRAM
  # Cobre small → large para análise comparativa estatística
  gpu_128gb:
    - qwen2.5-coder-7b        # ~4  GB Q4  — baseline
    - qwen2.5-coder-14b       # ~9  GB Q4  — mid
    - deepseek-coder-v2-lite  # ~32 GB BF16 — comparison
    - qwen2.5-coder-32b       # ~65 GB BF16 — large (SOTA coding)

  # Experimento principal do corpus (H1/H3/H5)
  corpus_experiment:
    - qwen2.5-coder-7b
    - qwen2.5-coder-14b
    - qwen2.5-coder-32b

  all_qwen:
    - qwen2.5-coder-7b
    - qwen2.5-coder-14b
    - qwen2.5-coder-32b

  all_deepseek:
    - deepseek-coder-v2-16b
    - deepseek-coder-v2-236b

  # Grupo recomendado para GPU com >=8 GB VRAM
  recommended:
    - qwen2.5-coder-7b
    - qwen2.5-coder-14b
    - deepseek-coder-v2-16b

  # Experimento comparativo principal — 3 famílias diferentes em ~14B
  # Objetivo: avaliar qual arquitetura/família produz melhores correções a11y
  # Hardware: RTX 4090 (24 GB VRAM) — todos via ollama Q4_K_M
  # VRAM total por modelo: ~9-10 GB; modelos carregados um de cada vez (cold-start)
  experiment_14b:
    - qwen2.5-coder-14b      # Qwen2.5-Coder (Alibaba) — SOTA código 14B
    - deepseek-coder-v2-16b  # DeepSeek-Coder-V2 Lite (DeepSeek AI) — FIM + instruct
    - starcoder2-15b         # StarCoder2 (BigCode/HuggingFace) — open-science

  # Grupo para GPU com apenas 4 GB VRAM (ex: GTX 1650, RTX 3050)
  # Modelos que cabem totalmente ou com partial offload mínimo
  low_vram_4gb:
    - qwen2.5-coder-3b
    - qwen2.5-coder-7b
    - codellama-7b

  # ── Grupo para GPU FRACA no Windows (≤8 GB VRAM) ─────────────────────────
  # Todos via Ollama: compatível com Windows, sem vLLM (requer Linux).
  # SELEÇÃO: 3 famílias distintas em ≤7B → validade comparativa preservada
  #   qwen2.5-coder-7b : SOTA 7B código   ~4.1 GB Q4_K_M  ← principal
  #   codellama-7b      : família Meta      ~4.1 GB Q4_K_M  ← comparação
  #   qwen2.5-coder-3b  : baseline leve     ~2.0 GB Q4_K_M  ← referência
  # Não inclui modelos >8B: excedem VRAM segura sem CPU-offload excessivo.
  # Usar: experiment experiments/experiment_weak_gpu.yaml
  weak_gpu_windows:
    - qwen2.5-coder-7b
    - codellama-7b
    - qwen2.5-coder-3b
